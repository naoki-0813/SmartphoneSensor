  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    overflow:hidden; user-select:none;
    height:100dvh;
  }

  /* ===== 縦向きのときの回転うながし ===== */
  .rotate-hint { display:none; }
  @media (orientation: portrait) {
    .dash { display:none !important; }
    .rotate-hint {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100dvh; gap:18px; text-align:center; padding:24px; color:var(--dim);
    }
    .rotate-hint .ico { font-size:54px; animation:tilt 1.8s ease-in-out infinite; }
    .rotate-hint b { color:var(--text); font-size:17px; letter-spacing:1px; }
  }
  @keyframes tilt { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }

  /* ===== ダッシュボード本体(横向き) ===== */
  .dash { display:flex; height:100dvh; padding:10px; gap:10px; }
  .col { background:var(--panel); border:1px solid var(--line); border-radius:14px; }

  /* --- 左: 速度・状態・操作 --- */
  .col-left { flex:0 0 25%; display:flex; flex-direction:column; padding:10px 12px; min-width:170px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:12px; letter-spacing:3px; color:var(--dim); font-weight:700; }
  .logo b { color:var(--text); }
  .sensors { display:flex; gap:7px; }
  .sensor { display:flex; align-items:center; gap:3px; font-size:8px; color:var(--dim); }
  .dot { width:6px; height:6px; border-radius:50%; background:#3A4763; }
  .dot.on { background:var(--ok); box-shadow:0 0 6px var(--ok); }
  .dot.warn { background:var(--accel); box-shadow:0 0 6px var(--accel); }

  .speed-wrap { margin-top:auto; margin-bottom:auto; text-align:center; }
  .speed { font-family:var(--digit); font-size:clamp(56px,11vw,104px); line-height:0.9; font-variant-numeric:tabular-nums; letter-spacing:-2px; }
  .speed small { font-size:15px; color:var(--dim); letter-spacing:2px; font-weight:600; }
  .speed-sub { font-size:10px; color:var(--dim); margin-top:6px; font-variant-numeric:tabular-nums; }
  .speed-sub b { color:var(--gps); }
  .state-chip {
    margin:10px auto 0; padding:5px 18px; border-radius:999px; font-size:14px; font-weight:700;
    letter-spacing:4px; border:1px solid var(--line); color:var(--dim); background:#0D1322;
    transition:all .25s; display:inline-block;
  }
  .state-chip.accel { color:#1A1205; background:var(--accel); border-color:var(--accel); }
  .state-chip.brake { color:#2A0810; background:var(--brake); border-color:var(--brake); }
  .state-chip.cruise { color:var(--ok); border-color:var(--ok); }

  .controls { display:flex; gap:6px; margin-top:12px; }
  button {
    flex:1; padding:11px 0; border-radius:10px; border:1px solid var(--line);
    background:#0D1322; color:var(--text); font-size:11px; font-weight:700; font-family:inherit; cursor:pointer;
  }
  button:active { transform:scale(.97); }
  button.primary { background:var(--gps); border-color:var(--gps); color:#06131C; }
  button.primary.running { background:var(--brake); border-color:var(--brake); color:#fff; }
  button:disabled { opacity:.4; }

  /* --- 中央: 車体姿勢 --- */
  .col-center { flex:1; position:relative; display:flex; align-items:center; justify-content:center;
    perspective:950px; perspective-origin:50% 44%; overflow:hidden; }
  .stage-tag { position:absolute; font-size:9px; letter-spacing:2px; color:var(--dim); z-index:2; }
  .stage-tag.front { top:8px; } .stage-tag.rear { bottom:8px; }
  #carGlow { position:absolute; left:50%; top:50%; width:78%; aspect-ratio:1; transform:translate(-50%,-50%);
    border-radius:50%; background:radial-gradient(circle,rgba(87,212,255,.16) 0%,transparent 62%); transition:background .25s; pointer-events:none; }
  .car3d { position:relative; height:86%; aspect-ratio:555/671; transform-style:preserve-3d;
    transition:transform .16s ease-out; will-change:transform; }
  .car-base { position:absolute; inset:0; background-image:var(--car); background-size:contain;
    background-repeat:no-repeat; background-position:center; filter:drop-shadow(0 14px 14px rgba(0,0,0,.5)); }
  .zone { position:absolute; inset:0; background:#ff2a1e; opacity:0; transition:opacity .16s ease-out;
    -webkit-mask-size:contain,100% 100%; mask-size:contain,100% 100%;
    -webkit-mask-repeat:no-repeat,no-repeat; mask-repeat:no-repeat,no-repeat;
    -webkit-mask-position:center,center; mask-position:center,center;
    -webkit-mask-composite:source-in; mask-composite:intersect; }
  .zone-front{ -webkit-mask-image:var(--car),linear-gradient(to bottom,#000,transparent 52%); mask-image:var(--car),linear-gradient(to bottom,#000,transparent 52%);}
  .zone-rear { -webkit-mask-image:var(--car),linear-gradient(to top,#000,transparent 52%); mask-image:var(--car),linear-gradient(to top,#000,transparent 52%);}
  .zone-left { -webkit-mask-image:var(--car),linear-gradient(to right,#000,transparent 55%); mask-image:var(--car),linear-gradient(to right,#000,transparent 55%);}
  .zone-right{ -webkit-mask-image:var(--car),linear-gradient(to left,#000,transparent 55%); mask-image:var(--car),linear-gradient(to left,#000,transparent 55%);}

  /* --- 右: G-Gサークル + 数値 --- */
  .col-right { flex:0 0 30%; display:flex; flex-direction:column; padding:10px 12px; gap:8px; min-width:190px; }
  .gg-head { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); letter-spacing:1px; }
  #gNow { color:var(--text); font-family:var(--digit); }
  .radar { fill:rgba(255,180,84,0.14); stroke:var(--accel); stroke-width:1.4; stroke-linejoin:round; }
  .gg-wrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; }
  .gg-wrap svg { width:100%; height:100%; max-height:200px; overflow:visible; }
  .gg-wrap .ring { fill:none; stroke:#1E2840; stroke-width:1.2; }
  .gg-wrap .ring.mid { stroke:#26314e; }
  .gg-wrap .axis { stroke:#1E2840; stroke-width:1; }
  .gg-wrap .rlabel { fill:var(--dim); font-size:8px; font-family:var(--digit); }
  #gdot { transition:none; }
  .gg-dirs { position:absolute; inset:0; pointer-events:none; }
  .gg-dirs span { position:absolute; font-size:8px; color:var(--dim); letter-spacing:1px; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .gg-dirs b { color:var(--accel); font-family:var(--digit); font-size:11px; font-weight:700; }
  .gg-dirs .t{ top:0; left:50%; transform:translateX(-50%); }
  .gg-dirs .b{ bottom:0; left:50%; transform:translateX(-50%); }
  .gg-dirs .l{ left:0; top:50%; transform:translateY(-50%); }
  .gg-dirs .r{ right:0; top:50%; transform:translateY(-50%); }

  .gnums { display:flex; gap:8px; }
  .gnum { flex:1; background:#0D1322; border:1px solid var(--line); border-radius:10px; padding:7px 9px; }
  .gnum .lab { font-size:8px; color:var(--dim); letter-spacing:1px; }
  .gnum .val { font-family:var(--digit); font-size:18px; font-variant-numeric:tabular-nums; margin-top:2px; }
  .gnum .val small { font-size:9px; color:var(--dim); }
  .ministat { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); }
  .ministat b { color:var(--text); font-family:var(--digit); }

  .status-line { font-size:10px; color:var(--dim); text-align:center; min-height:13px; }
</style>
</head>
<body>

<div class="rotate-hint">
  <div class="ico">📱</div>
  <b>スマホを横向きにしてください</b>
  <div>FUSION DASH は横画面に最適化されています</div>
</div>

<div class="dash">
  <!-- 左 -->
  <div class="col col-left">
    <div class="topbar">
      <div class="logo">FUSION<b>DASH</b></div>
      <div class="sensors">
        <div class="sensor"><span class="dot" id="dotMotion"></span>MOT</div>
        <div class="sensor"><span class="dot" id="dotGps"></span>GPS</div>
        <div class="sensor"><span class="dot" id="dotCal"></span>CAL</div>
      </div>
    </div>

    <div class="speed-wrap">
      <div class="speed" id="speedValue">0<small> km/h</small></div>
      <div class="speed-sub">GPS <b id="gpsRaw">--</b> ・ 精度 <span id="gpsAcc">--</span>m</div>
      <div><span class="state-chip" id="stateChip">停 車</span></div>
    </div>

    <div class="controls">
      <button id="btnDemo">デモ</button>
      <button id="btnCal" disabled>CAL</button>
      <button class="primary" id="btnStart">開始</button>
    </div>
  </div>

  <!-- 中央: 車 -->
  <div class="col col-center">
    <span class="stage-tag front">FRONT</span>
    <span class="stage-tag rear">REAR</span>
    <div id="carGlow"></div>
    <div class="car3d" id="car3d">
      <div class="car-base"></div>
      <div class="zone zone-front" id="zFront"></div>
      <div class="zone zone-rear"  id="zRear"></div>
      <div class="zone zone-left"  id="zLeft"></div>
      <div class="zone zone-right" id="zRight"></div>
    </div>
  </div>

  <!-- 右: G-Gサークル -->
  <div class="col col-right">
    <div class="gg-head"><span>G-Gダイアグラム(最大保持)</span><span>現在 <span id="gNow">0.00</span> G</span></div>
    <div class="gg-wrap">
      <svg viewBox="-100 -100 200 200">
        <circle class="ring" r="96"/>
        <circle class="ring mid" r="64"/>
        <circle class="ring mid" r="32"/>
        <line class="axis" x1="-96" y1="0" x2="96" y2="0"/>
        <line class="axis" x1="0" y1="-96" x2="0" y2="96"/>
        <text class="rlabel" x="3" y="-30">.2</text>
        <text class="rlabel" x="3" y="-62">.4</text>
        <text class="rlabel" x="3" y="-94">.6</text>
        <polygon id="radar" class="radar" points=""/>
        <circle id="gdot" r="11" cx="0" cy="0" fill="#57D4FF"/>
      </svg>
      <div class="gg-dirs">
        <span class="t">ACCEL<b id="maxAccel">0.00</b></span>
        <span class="b">BRAKE<b id="maxBrake">0.00</b></span>
        <span class="l">L<b id="maxLeft">0.00</b></span>
        <span class="r">R<b id="maxRight">0.00</b></span>
      </div>
    </div>
    <div class="gnums">
      <div class="gnum"><div class="lab">前後G</div><div class="val" id="fwdG">+0.00 <small>G</small></div></div>
      <div class="gnum"><div class="lab">左右G</div><div class="val" id="latGv">0.00 <small>G</small></div></div>
    </div>
    <div class="ministat">
      <span>更新 <b id="hz">--</b>Hz</span>
      <span>前後軸学習 <b id="axisConf">0</b>%</span>
    </div>
    <div class="status-line" id="statusLine">「開始」でセンサーを許可</div>
  </div>
</div>

<script>
/* =========================================================
   FUSION DASH — 横向きGダッシュボード
   速度=GPS主役 / 加速度=センサー主役 を相補フィルタで融合。
   横持ち対応:端末の生加速度を画面の向き(orientation.angle)に
   合わせて回転させ、画面基準の座標系で処理する。
   ========================================================= */
const GRAVITY=9.80665, LP_ACCEL=0.25, GPS_GAIN=0.35;
const AXIS_LEARN=0.15, AXIS_MIN_ACC=0.4, STATE_G_TH=0.05, STATE_HOLD_MS=500, GPS_TIMEOUT_MS=5000;
// 表示
const PITCH_FS=0.45, ROLL_FS=0.45, PITCH_MAX=14, ROLL_MAX=12, ZONE_FS=0.48, GG_FS=0.6;
const clamp1=v=>Math.max(-1,Math.min(1,v));
const $=id=>document.getElementById(id);

let running=false, demoMode=false;
let gravityVec=null, forwardVec=null, axisConfidence=0;
let gravityEst=null;   // 重力の常時自動推定(CAL不要の即時反応用)
let fusedSpeed=0, fwdAccel=0, latAccel=0;
let lastMotionT=null;
let lastGps={speed:null,time:0,acc:null,prevSpeed:null,prevTime:0};
let accelBuf=[], stateTimer={state:'stop',since:0};
let hzCount=0, hzLast=performance.now();
let calSamples=null, watchId=null, wakeLock=null, demoTimer=null;


// ベクトル小道具
const dot=(a,b)=>a.x*b.x+a.y*b.y+a.z*b.z;
const norm=v=>Math.sqrt(dot(v,v));
const scale=(v,s)=>({x:v.x*s,y:v.y*s,z:v.z*s});
const sub=(a,b)=>({x:a.x-b.x,y:a.y-b.y,z:a.z-b.z});
const add=(a,b)=>({x:a.x+b.x,y:a.y+b.y,z:a.z+b.z});
const unit=v=>{const n=norm(v);return n>1e-6?scale(v,1/n):{x:0,y:0,z:0};};
const lerpColor=(a,b,t)=>{t=Math.max(0,Math.min(1,t));return a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(',');};

/* 端末座標 → 画面座標(横持ち対応の核心) */
function screenAngle(){
  let a = 0;
  if (screen.orientation && typeof screen.orientation.angle === 'number') a = screen.orientation.angle;
  else if (typeof window.orientation === 'number') a = window.orientation;
  return a * Math.PI / 180;
}
function toScreenFrame(v){
  const a = screenAngle(), c = Math.cos(a), s = Math.sin(a);
  // 画面が角度aだけ回転している分、ベクトルを-aだけ回して画面基準にする
  return { x: v.x*c + v.y*s, y: -v.x*s + v.y*c, z: v.z };
}

/* ① DeviceMotion */
function onMotion(e){
  const ag=e.accelerationIncludingGravity;
  if(!ag||ag.x===null) return;
  const now=performance.now();
  const raw=toScreenFrame({x:ag.x,y:ag.y,z:ag.z});   // ★画面基準に正規化

  hzCount++;
  if(now-hzLast>1000){ $('hz').textContent=hzCount; hzCount=0; hzLast=now; }

  if(calSamples){ calSamples.push(raw); return; }

  // --- 重力を常時自動推定(CALボタンなしでも即反応) ---
  if(!gravityEst) gravityEst={x:raw.x,y:raw.y,z:raw.z};
  else { const k=0.02; gravityEst=add(scale(gravityEst,1-k),scale(raw,k)); }
  const gv = gravityVec || gravityEst;        // 手動CALがあれば優先、なければ自動
  if($('dotCal').className==='dot') $('dotCal').className = gravityVec?'dot on':'dot warn';

  let lin;
  if(e.acceleration && e.acceleration.x!==null){
    lin = toScreenFrame({x:e.acceleration.x,y:e.acceleration.y,z:e.acceleration.z});
  } else {
    lin = sub(raw, gv);
  }

  const gHat=unit(gv);
  const horiz=sub(lin, scale(gHat, dot(lin,gHat)));   // 水平面に投影

  // --- 前後軸が未学習なら暫定の前方向を決めて即反応 ---
  // 画面の上方向→水平成分が小さければ画面奥方向、で前を推定。GPSで後から補正/反転。
  if(!forwardVec){
    const cands=[{x:0,y:1,z:0}, {x:0,y:0,z:-1}];
    for(const c of cands){
      const fc=sub(c, scale(gHat, dot(c,gHat)));
      if(norm(fc)>0.25){ forwardVec=unit(fc); break; }
    }
  }

  let f=0,l=0;
  if(forwardVec){
    f=dot(horiz,forwardVec);
    const latVec=sub(horiz, scale(forwardVec,f));
    const cross=gHat.x*(forwardVec.y*latVec.z-forwardVec.z*latVec.y)
               +gHat.y*(forwardVec.z*latVec.x-forwardVec.x*latVec.z)
               +gHat.z*(forwardVec.x*latVec.y-forwardVec.y*latVec.x);
    l=norm(latVec)*Math.sign(cross||1);
  }
  fwdAccel += LP_ACCEL*(f-fwdAccel);
  latAccel += LP_ACCEL*(l-latAccel);

  accelBuf.push(horiz);
  if(accelBuf.length>300) accelBuf.shift();

  if(lastMotionT!==null){
    const dt=Math.min((now-lastMotionT)/1000,0.1);
    if(forwardVec && axisConfidence>0.3){
      fusedSpeed+=fwdAccel*dt;
      if(fusedSpeed<0) fusedSpeed=0;
    }
  }
  lastMotionT=now;
  updateDisplay();
}

/* ② GPS */
function onGps(pos){
  const now=performance.now();
  const sp=pos.coords.speed;
  lastGps.acc=pos.coords.accuracy;
  $('dotGps').className='dot on';
  $('gpsAcc').textContent=lastGps.acc?lastGps.acc.toFixed(0):'--';
  if(sp===null||lastGps.acc>30){ lastGps.time=now; return; }
  $('gpsRaw').textContent=(sp*3.6).toFixed(0);

  if(lastGps.speed!==null){
    const dtg=(now-lastGps.prevTime)/1000;
    if(dtg>0.3&&dtg<4){
      const gpsAccel=(sp-lastGps.speed)/dtg;
      if(Math.abs(gpsAccel)>AXIS_MIN_ACC && accelBuf.length>5){
        let avg={x:0,y:0,z:0};
        accelBuf.forEach(v=>avg=add(avg,v));
        avg=scale(avg,1/accelBuf.length);
        if(norm(avg)>0.15){
          const cand=unit(scale(avg,Math.sign(gpsAccel)));
          forwardVec=forwardVec?unit(add(scale(forwardVec,1-AXIS_LEARN),scale(cand,AXIS_LEARN))):cand;
          axisConfidence=Math.min(1,axisConfidence+0.15);
          $('axisConf').textContent=Math.round(axisConfidence*100);
        }
      }
    }
  }
  fusedSpeed+=GPS_GAIN*(sp-fusedSpeed);
  accelBuf=[];
  lastGps.prevSpeed=lastGps.speed; lastGps.prevTime=lastGps.time||now;
  lastGps.speed=sp; lastGps.time=now;
}

/* ③ 状態判定 */
function judgeState(now){
  const g=fwdAccel/GRAVITY;
  let want;
  if(fusedSpeed*3.6<2 && Math.abs(g)<STATE_G_TH) want='stop';
  else if(g>STATE_G_TH) want='accel';
  else if(g<-STATE_G_TH) want='brake';
  else want='cruise';
  if(want!==stateTimer.state){
    if(now-stateTimer.since>STATE_HOLD_MS){ stateTimer.state=want; stateTimer.since=now; applyChip(want); }
  } else stateTimer.since=now;
}
function applyChip(s){
  const map={stop:['停 車',''],accel:['加速中','accel'],brake:['減速中','brake'],cruise:['巡 航','cruise']};
  $('stateChip').textContent=map[s][0];
  $('stateChip').className='state-chip '+map[s][1];
}

/* 車体姿勢 + 赤グラデーション */
function updateCar(g,gLat){
  const wrap=$('car3d'); if(!wrap) return;
  const pitch=clamp1(g/PITCH_FS)*PITCH_MAX;
  const roll =clamp1(gLat/ROLL_FS)*ROLL_MAX;
  wrap.style.transform=`rotateX(${pitch.toFixed(1)}deg) rotateY(${roll.toFixed(1)}deg)`;
  setOp('zFront',Math.max(0,-g)/ZONE_FS);
  setOp('zRear', Math.max(0, g)/ZONE_FS);
  setOp('zLeft', Math.max(0, gLat)/ZONE_FS);
  setOp('zRight',Math.max(0,-gLat)/ZONE_FS);
  const total=Math.min(1,Math.hypot(g,gLat)/0.6);
  const halo=lerpColor([87,212,255],[255,59,48],total);
  $('carGlow').style.background=`radial-gradient(circle,rgba(${halo},${(0.16+total*0.4).toFixed(2)}) 0%,transparent 62%)`;
}
function setOp(id,v){ const el=$(id); if(el) el.style.opacity=Math.min(0.88,Math.max(0,v)).toFixed(2); }

/* G-Gサークル + 方向別Max(レーダー) */
const RADAR_N=12;
let radarBins=new Array(RADAR_N).fill(0);   // 方向ごとの最大半径[px]
let maxAccel=0,maxBrake=0,maxLeft=0,maxRight=0;

function updateGG(g,gLat){
  const x= clamp1(gLat/GG_FS)*96;
  const y=-clamp1(g/GG_FS)*96;     // accel(+)で上へ
  const dotEl=$('gdot');
  dotEl.setAttribute('cx',x.toFixed(1));
  dotEl.setAttribute('cy',y.toFixed(1));
  const mag=Math.hypot(g,gLat);
  const total=Math.min(1,mag/GG_FS);
  dotEl.setAttribute('fill',`rgb(${lerpColor([87,212,255],[255,59,48],total)})`);
  $('gNow').textContent=mag.toFixed(2);

  // 方向別の最大を保持(レーダー)
  if(mag>0.02){
    const vx=gLat, vy=-g;                       // 右+ / 上(加速)+
    let ang=Math.atan2(vy,vx); if(ang<0) ang+=Math.PI*2;
    const step=Math.PI*2/RADAR_N;
    const bin=((Math.round(ang/step)%RADAR_N)+RADAR_N)%RADAR_N;   // 軸に合わせて丸める
    const r=Math.min(96, mag/GG_FS*96);
    if(r>radarBins[bin]) radarBins[bin]=r;
    drawRadar();
  }
  // 4方向の最大値(数値)
  if(g>maxAccel){    maxAccel=g;     $('maxAccel').textContent=g.toFixed(2); }
  if(-g>maxBrake){   maxBrake=-g;    $('maxBrake').textContent=(-g).toFixed(2); }
  if(gLat>maxRight){ maxRight=gLat;  $('maxRight').textContent=gLat.toFixed(2); }
  if(-gLat>maxLeft){ maxLeft=-gLat;  $('maxLeft').textContent=(-gLat).toFixed(2); }
}

function drawRadar(){
  const step=Math.PI*2/RADAR_N, pts=[];
  for(let i=0;i<RADAR_N;i++){
    const th=i*step, rr=radarBins[i];
    pts.push((rr*Math.cos(th)).toFixed(1)+','+(rr*Math.sin(th)).toFixed(1));
  }
  $('radar').setAttribute('points', pts.join(' '));
}

function resetMax(){
  radarBins=new Array(RADAR_N).fill(0);
  maxAccel=maxBrake=maxLeft=maxRight=0;
  ['maxAccel','maxBrake','maxLeft','maxRight'].forEach(id=>$(id).textContent='0.00');
  $('radar').setAttribute('points','');
}

/* 表示更新 */
function updateDisplay(){
  const now=performance.now();
  $('speedValue').innerHTML=Math.round(fusedSpeed*3.6)+'<small> km/h</small>';
  const g=fwdAccel/GRAVITY, gLat=latAccel/GRAVITY;
  $('fwdG').innerHTML=(g>=0?'+':'')+g.toFixed(2)+' <small>G</small>';
  $('latGv').innerHTML=Math.abs(gLat).toFixed(2)+' <small>G</small>';
  updateCar(g,gLat);
  updateGG(g,gLat);
  if(running && !demoMode && now-lastGps.time>GPS_TIMEOUT_MS){
    $('dotGps').className='dot warn';
    $('statusLine').textContent='GPS信号が弱く精度が低下しています';
  }
  judgeState(now);
}

/* キャリブレーション */
function calibrate(){
  calSamples=[]; $('btnCal').disabled=true;
  $('statusLine').textContent='静止CAL中… 動かさないで(3秒)';
  setTimeout(()=>{
    if(!calSamples||calSamples.length<10){ $('statusLine').textContent='データ不足。再試行してください'; calSamples=null; $('btnCal').disabled=false; return; }
    let avg={x:0,y:0,z:0}; calSamples.forEach(v=>avg=add(avg,v));
    gravityVec=scale(avg,1/calSamples.length); calSamples=null;
    $('dotCal').className='dot on'; $('btnCal').disabled=false;
    $('statusLine').textContent='CAL完了。走行で前後軸を自動学習します';
  },3000);
}

/* 開始/停止 */
async function start(){
  try{
    if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      const r=await DeviceMotionEvent.requestPermission();
      if(r!=='granted'){ $('statusLine').textContent='モーションが許可されませんでした'; return; }
    }
    window.addEventListener('devicemotion',onMotion);
    $('dotMotion').className='dot on';
    watchId=navigator.geolocation.watchPosition(onGps,
      err=>{ $('dotGps').className='dot warn'; $('statusLine').textContent='GPSエラー: '+err.message; },
      {enableHighAccuracy:true,maximumAge:0,timeout:10000});
    try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
    try{ if(screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape'); }catch(e){}
    // 計測を新規に開始:学習状態・速度・最大値をリセット(重力は走り出すと自動推定)
    gravityVec=null; gravityEst=null; forwardVec=null; axisConfidence=0;
    fusedSpeed=0; lastMotionT=null; accelBuf=[];
    $('dotCal').className='dot'; $('axisConf').textContent='0';
    resetMax();
    running=true;
    $('btnStart').textContent='停止'; $('btnStart').classList.add('running'); $('btnCal').disabled=false;
    $('statusLine').textContent='計測中。走り出すと前後軸を自動学習(静止CALで精度UP)';
  }catch(err){ $('statusLine').textContent='開始エラー: '+err.message; }
}
function stop(){
  window.removeEventListener('devicemotion',onMotion);
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  if(wakeLock){ wakeLock.release(); wakeLock=null; }
  if(demoTimer){ clearInterval(demoTimer); demoTimer=null; }
  running=false; demoMode=false;
  $('btnStart').textContent='開始'; $('btnStart').classList.remove('running');
  $('dotMotion').className='dot'; $('dotGps').className='dot'; $('dotCal').className='dot';
  $('statusLine').textContent='停止しました(最大値は保持中。次の「開始」でリセット)';
}
$('btnStart').addEventListener('click',()=>running?stop():start());
$('btnCal').addEventListener('click',calibrate);

/* デモ */
$('btnDemo').addEventListener('click',()=>{
  if(running) stop();
  demoMode=true; running=true;
  gravityVec={x:0,y:0,z:GRAVITY}; forwardVec={x:0,y:1,z:0}; axisConfidence=1;
  $('axisConf').textContent='100';
  $('dotMotion').className='dot on'; $('dotGps').className='dot on'; $('dotCal').className='dot on';
  $('btnStart').textContent='停止'; $('btnStart').classList.add('running');
  $('statusLine').textContent='デモ: 加速→巡航→減速→コーナー';
  resetMax();
  let t=0,v=0;
  demoTimer=setInterval(()=>{
    t+=0.05; const phase=t%26; let a,lat;
    if(phase<6){ a=2.2*(1-phase/8); lat=0; }
    else if(phase<12){ a=(Math.random()-0.5)*0.3; lat=2.6*Math.sin((phase-9)*1.0); }
    else if(phase<17){ a=-2.8; lat=0; }
    else if(phase<22){ a=0.2; lat=-2.6*Math.sin((phase-19)*1.0); }
    else { a=0; lat=0; }
    v=Math.max(0,v+a*0.05);
    fwdAccel+=0.3*((a+(Math.random()-0.5)*0.4)-fwdAccel);
    latAccel+=0.3*(lat-latAccel);
    fusedSpeed=v;
    $('gpsRaw').textContent=(v*3.6).toFixed(0); $('gpsAcc').textContent='5';
    lastGps.time=performance.now(); $('hz').textContent='20';
    updateDisplay();
  },50);
});

// 向きが変わったら再CALを促す
window.addEventListener('orientationchange',()=>{
  if(running && !demoMode){ $('statusLine').textContent='向きが変わりました。静止CALをやり直してください'; }
});
</script>
</body>
